name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (Drift, Freezed, Riverpod)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Create iOS project files
        run: |
          flutter create --platforms=ios . \
            --org com.mihon \
            --project-name mihon_ios \
            --description "Mihon manga reader for iOS"

      - name: Patch Info.plist (allow arbitrary HTTP loads for manga sources)
        run: |
          /usr/libexec/PlistBuddy -c \
            "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" \
            ios/Runner/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c \
            "Set :NSAppTransportSecurity:NSAllowsArbitraryLoads true" \
            ios/Runner/Info.plist

      - name: Disable code signing in Xcode project
        run: |
          # Strip all code signing requirements so xcodebuild works without a team
          sed -i '' \
            's/CODE_SIGN_IDENTITY = "iPhone Developer"/CODE_SIGN_IDENTITY = ""/g' \
            ios/Runner.xcodeproj/project.pbxproj
          sed -i '' \
            's/CODE_SIGN_IDENTITY = "iPhone Distribution"/CODE_SIGN_IDENTITY = ""/g' \
            ios/Runner.xcodeproj/project.pbxproj
          # Add CODE_SIGNING_REQUIRED = NO and DEVELOPMENT_TEAM = "" via xcconfig
          cat >> ios/Flutter/Release.xcconfig << 'EOF'
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO
          CODE_SIGN_IDENTITY=
          DEVELOPMENT_TEAM=
          EOF
          cat >> ios/Flutter/Debug.xcconfig << 'EOF'
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO
          CODE_SIGN_IDENTITY=
          DEVELOPMENT_TEAM=
          EOF

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS app (no code signing)
        run: |
          flutter build ios --no-codesign --release

      - name: Package as IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r mihon-ios-unsigned.ipa Payload/
          echo "IPA created: $(ls -lh mihon-ios-unsigned.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihon-ios-unsigned
          path: build/ios/ipa/mihon-ios-unsigned.ipa
          retention-days: 30

name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14   # Xcode 15 — --no-codesign works reliably

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (Drift, Freezed, Riverpod)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Create iOS project files
        run: |
          flutter create --platforms=ios . \
            --org com.mihon \
            --project-name mihon_ios \
            --description "Mihon manga reader for iOS"

      - name: Patch Info.plist (allow arbitrary HTTP loads)
        run: |
          /usr/libexec/PlistBuddy -c \
            "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" \
            ios/Runner/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c \
            "Set :NSAppTransportSecurity:NSAllowsArbitraryLoads true" \
            ios/Runner/Info.plist

      - name: Disable code signing in Xcode project
        run: |
          python3 - <<'EOF'
          import re
          path = 'ios/Runner.xcodeproj/project.pbxproj'
          content = open(path).read()
          # Handle any value (empty string, word chars, or quoted string)
          content = re.sub(r'\bDEVELOPMENT_TEAM = [^;]*;', 'DEVELOPMENT_TEAM = "";', content)
          content = re.sub(r'\bCODE_SIGN_STYLE = \w+;', 'CODE_SIGN_STYLE = Manual;', content)
          content = re.sub(r'\bCODE_SIGN_IDENTITY = "[^"]*";', 'CODE_SIGN_IDENTITY = "";', content)
          content = re.sub(r'\bPROVISIONING_PROFILE_SPECIFIER = "[^"]*";',
                           'PROVISIONING_PROFILE_SPECIFIER = "";', content)
          open(path, 'w').write(content)
          print('Patched project.pbxproj — code signing disabled')
          # Show relevant lines for debugging
          for line in content.splitlines():
              kw = ('CODE_SIGN', 'DEVELOPMENT_TEAM', 'PROVISIONING')
              if any(k in line for k in kw):
                  print(' ', line.strip())
          EOF

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS app
        run: |
          set +e
          flutter build ios --no-codesign --release 2>&1
          FLUTTER_EXIT=$?
          set -e

          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            echo "✅ Runner.app built via flutter build"
            exit 0
          fi

          echo "flutter build exited $FLUTTER_EXIT — trying xcodebuild directly..."

          # Dart artifacts were compiled by the flutter invocation above.
          # Call xcodebuild with explicit no-signing flags so the signing
          # step that caused flutter to fail is bypassed.
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -derivedDataPath "$(pwd)/build/ios/DerivedData" \
            build

          APP=$(find build/ios/DerivedData -name "Runner.app" -type d | grep "Release-iphoneos" | head -1)
          if [ -z "$APP" ]; then
            APP=$(find build/ios/DerivedData -name "Runner.app" -type d | head -1)
          fi

          if [ -n "$APP" ]; then
            mkdir -p build/ios/iphoneos
            cp -r "$APP" build/ios/iphoneos/Runner.app
            echo "✅ Runner.app built via xcodebuild"
          else
            echo "❌ Runner.app not found anywhere"
            exit 1
          fi

      - name: Package as IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r mihon-ios-unsigned.ipa Payload/
          echo "IPA size: $(du -sh mihon-ios-unsigned.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: mihon-ios-unsigned
          path: build/ios/ipa/mihon-ios-unsigned.ipa
          retention-days: 30

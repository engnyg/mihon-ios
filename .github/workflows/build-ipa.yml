name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (Drift, Freezed, Riverpod)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Create iOS project files
        run: |
          flutter create --platforms=ios . \
            --org com.mihon \
            --project-name mihon_ios \
            --description "Mihon manga reader for iOS"

      - name: Patch Info.plist (allow arbitrary HTTP loads)
        run: |
          /usr/libexec/PlistBuddy -c \
            "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" \
            ios/Runner/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c \
            "Set :NSAppTransportSecurity:NSAllowsArbitraryLoads true" \
            ios/Runner/Info.plist

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS app
        run: |
          # Flutter builds the .app successfully via Xcode.
          # It only fails at the post-build provisioning check — we ignore that.
          set +e
          flutter build ios --no-codesign --release
          EXIT=$?
          set -e
          # Exit 0 = full success, Exit 1 = provisioning check fail (still ok)
          # Check the .app was actually created
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            echo "✅ Runner.app built successfully"
          else
            echo "❌ Runner.app not found — build truly failed"
            exit $EXIT
          fi

      - name: Package as IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r mihon-ios-unsigned.ipa Payload/
          echo "IPA size: $(du -sh mihon-ios-unsigned.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: mihon-ios-unsigned
          path: build/ios/ipa/mihon-ios-unsigned.ipa
          retention-days: 30

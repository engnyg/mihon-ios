name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (Drift, Freezed, Riverpod)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Create iOS project files
        run: |
          flutter create --platforms=ios . \
            --org com.mihon \
            --project-name mihon_ios \
            --description "Mihon manga reader for iOS"

      - name: Patch Info.plist (allow arbitrary HTTP loads for manga sources)
        run: |
          /usr/libexec/PlistBuddy -c \
            "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" \
            ios/Runner/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c \
            "Set :NSAppTransportSecurity:NSAllowsArbitraryLoads true" \
            ios/Runner/Info.plist

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build IPA (unsigned — installable via AltStore/Sideloadly)
        run: flutter build ipa --no-codesign --release

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihon-ios-unsigned
          path: build/ios/ipa/*.ipa
          retention-days: 30

      - name: Upload dSYM for crash reporting
        uses: actions/upload-artifact@v4
        with:
          name: mihon-ios-dsym
          path: build/ios/archive/Runner.xcarchive/dSYMs/
          retention-days: 30

name: mihon_ios
description: Mihon manga reader for iOS — Flutter port
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Database (drift = type-safe SQLite)
  drift: ^2.19.1
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Networking
  dio: ^5.4.3

  # Image loading & caching
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.3.1

  # DI
  get_it: ^7.7.0

  # Storage / preferences
  shared_preferences: ^2.2.3

  # HTML parsing (source scraping)
  html: ^0.15.4

  # Model utilities
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  collection: ^1.18.0
  intl: ^0.19.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.11
  drift_dev: ^2.19.1
  freezed: ^2.5.2
  json_serializable: ^6.8.0

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/sources/
